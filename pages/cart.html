<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Bag | AJIO</title>

<link rel="stylesheet" href="../css/cart.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>
<header>

    <!-- Top Navbar -->

    <div class="top-navbar">

        <a href="#">Shivani</a>

        <a href="#">My Account</a>

        <a href="#">Sign Out</a>

        <a href="#">Customer Care</a>

        <button>Visit AJIOLUXE</button>

    </div>

    <!-- Main Header -->

    <div class="cart-header">

        <!-- Logo -->

        <div class="logo">

            <img src="https://assets-jiocdn.ajio.com/static/img/Ajio-Logo.svg" alt="AJIO Logo">

        </div>

        <!-- Checkout Steps -->

        <div class="checkout-steps">

            <div class="step active">

                <i class="fa-solid fa-bag-shopping"></i>

                <span>Bag</span>

            </div>

            <div class="step-line"></div>

            <div class="step">

                <i class="fa-solid fa-location-dot"></i>

                <span>Delivery Details</span>

            </div>

            <div class="step-line"></div>

            <div class="step">

                <i class="fa-solid fa-indian-rupee-sign"></i>

                <span>Payment</span>

            </div>

        </div>

    </div>

</header>

<main>
    <section class="cart-container">

    <!-- LEFT SIDE -->
    <div class="cart-left">

        <!-- Gift Banner -->

        <div class="gift-banner">

            <div class="gift-info">

                <img src="https://assets-jiocdn.ajio.com/static/img/assured-gift-box.svg"
                     alt="Gift">

                <h4>You're Getting Free Gifts Worth ₹1495!</h4>

            </div>

            <a href="#">View Gifts</a>

        </div>

        <!-- Cart Heading -->

        <div class="cart-heading">

            <h2>
                My Bag
                <span>(2 Items)</span>
            </h2>

            <a href="#">
                + Add from Wishlist
            </a>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <aside class="cart-right">

    </aside>

</section>
</main>



</main>

<!-- Same Footer -->

</body>

</html>

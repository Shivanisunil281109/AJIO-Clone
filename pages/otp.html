<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>

    <link rel="stylesheet" href="../css/otp.css">
</head>

<body>

<div class="overlay">

    <div class="otp-box">

        <div class="top-row">

            <a href="register.html" class="back-btn">
                ← Back
            </a>

            <span class="close-btn">
                ×
            </span>

        </div>

        <h1>Sign In with OTP</h1>

        <p class="otp-text">
            Please enter OTP sent to
        </p>

        <div class="mobile-number">
            +91 91XXXXXX27
        </div>

        <input
            type="text"
            placeholder="Enter OTP"
        >

        <div class="resend-row">
            <span></span>

            <a href="#">
                Resend OTP in 55s
            </a>
        </div>

        <a href="../index.html" class="shopping-btn">
            START SHOPPING
        </a>

    </div>

</div>

</html>

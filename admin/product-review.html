<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AJIO Admin Dashboard</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Icons -->

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- CSS -->

    <link rel="stylesheet" href="css/product-review.css">

</head>







<body>

<div class="dashboard-container">
    
 <!-- Sidebar -->
<aside class="sidebar">
<div class="sidebar-logo">
<img
        src="https://assets-jiocdn.ajio.com/static/img/Ajio-Logo.svg"
        alt="AJIO Logo">
</div>


<div class="panel-title">

    <h3>ADMIN PANEL</h3>

</div>

    </aside>




 <!-- Main Content -->
<main class="main-content">
    
   <header class="admin-header">

    <!-- Left -->
    <div class="header-left">
        <span class="material-symbols-outlined menu-icon">
            menu
        </span>
    </div>

    <!-- Center -->
    <div class="header-center">

        <div class="search-box">

            <input
            type="text"
            placeholder="Search for orders, sellers, products...">

            <span class="material-symbols-outlined">
                search
            </span>

        </div>

    </div>

    <!-- Right -->
    <div class="header-right">

        <span class="material-symbols-outlined notification">
            notifications
        </span>

        <div class="admin-profile">

            <img src="../images/profile.jpg">

            <div>

                <h4>Admin</h4>

                <p>Super Admin</p>

            </div>

        

</header>








  
      <!-- Dashboard -->
      
        <section class="dashboard-content">
<div class="dashboard-top">

    <div class="dashboard-title">

        <h1>Dashboard</h1>

        <p>
            Welcome back, Admin! Here's what's happening with your AJIO store today.
        </p>

    </div>
</div>
    
        </section>


</main>




</div>



</body>

</html>
